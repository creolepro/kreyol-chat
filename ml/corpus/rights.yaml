    name: "VOA Nouvèl (voanouvel.com) — Haitian Creole service"
    priority_class: authored
    source_url: "https://www.voanouvel.com/"
    license:
      id: "US-GOV-PD"
      url: "https://www.insidevoa.com/p/5820.html"
      status: clear
      # Quoted at survey time (VOA terms of use / public-domain statement):
      evidence: >-
        "All text, audio and video material produced exclusively by the Voice of
        America is public domain" — U.S. federal work, 17 U.S.C. §105. CARVE-OUT:
        licensed AFP/AP/Reuters material embedded in articles is NOT PD.
    uses:
      analysis: allowed
      tokenizer_training: allowed
      model_training: allowed
      redistribution: allowed          # US-gov PD (VOA-produced text only)
    quarantined: false
    notes: >-
      Native-Kreyòl journalism. WIRE CARVE-OUT enforced in corpus/voa.py: drop
      articles bylined to AFP / AP (Associated Press) / Reuters entirely; strip
      wire-credited paragraphs elsewhere; when in doubt, drop. Only VOA-produced
      text is PD. robots.txt (2026-07-23) allows /a/ article paths; ~1 req/s,
      browser headers, backoff. J0 measured ~2.25M net-new kreyol-bpe tokens
      after wire-drop + MADLAD dedup (see reports/corpus_v0_2_scoping.md). Genre
      news / register journalism_authored. A held-out 2026 temporal slice becomes
      authored_eval_v2 (splits.yaml) — NEVER trained on.

