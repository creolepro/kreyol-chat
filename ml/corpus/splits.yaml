# Split registry — Workstream 0 (kreyol-chat, Phase 0)
#
# Fixed BEFORE ingestion and versioned forever. Every document produced by the
# corpus pipeline carries a `split` field (see schema.Split) assigned from this
# registry. The registry — not a random per-run shuffle — is what keeps eval
# clean and reproducible.
#
# Spec: docs/phase-0.md §Workstream 0; docs/plan.md §5.2.

meta:
  workstream: "0 — split registry"
  spec: "docs/phase-0.md §Workstream 0; docs/plan.md §5.2"
  authored: "2026-07-20"

# ---------------------------------------------------------------------------
# The five splits.
# ---------------------------------------------------------------------------
splits:
  - name: train
    purpose: "Pretraining + tokenizer training corpus (corpus v0)."
    may_enter_training: true
    notes: "Rights-clear sources only. Deduplicated, provenance-tagged."

  - name: tokenizer_eval
    purpose: "Held-out text for evaluating tokenizer compression / fertility (Workstream B/C)."
    may_enter_training: false
    notes: "Never used to TRAIN the tokenizer or any model; measurement only."

  - name: model_selection_dev
    purpose: "Model/hyperparameter selection during Phases 0b–2 (e.g. FLORES+ dev)."
    may_enter_training: false

  - name: final_devtest
    purpose: "Touched once, for final reporting on chosen model(s) (e.g. FLORES+ devtest)."
    may_enter_training: false
    notes: "Reserved. Workstream C already measures fertility on FLORES+ devtest — a measurement, not training."

  - name: exhibit_examples
    purpose: "Fixed prompts / demo items for the exhibit (Station 1/2/6); includes the proverb PROBE split."
    may_enter_training: false
    notes: "Held-out probe proverbs live here so Station 2 ('who knows the real proverb?') is honest."

# ---------------------------------------------------------------------------
# Rules (invariants enforced by the pipeline / checked before a training run).
# ---------------------------------------------------------------------------
rules:
  exclude_from_training:
    # All CreoleVal/FLORES content stays OUT of training (terms + contamination).
    - flores_plus
    - mit_haiti_creoleval        # CreoleVal MT dir (also quarantined in rights.yaml)
    - creolepro_dictionary       # quarantined
  authored_split_granularity: document_or_collection
  authored_split_never: sentence
  # Rationale: splitting authored material by sentence leaks near-duplicates
  # across train/eval. Split whole documents or whole collections instead.
  benchmark_contamination_check:
    enabled: true
    against: [flores_plus, mit_haiti_creoleval]
    method: "n-gram overlap (run against the FINAL training corpus, before any training run)"
    status: "defined here; executed at tokenizer/model-training time, not in corpus v0 assembly"

# ---------------------------------------------------------------------------
# Proverbs — the deliberate two-way split (docs/phase-0.md §Workstream 0).
# ---------------------------------------------------------------------------
proverbs:
  split_rule:
    teachable:
      into: train
      may_enter_training: true
      purpose: >-
        Models MAY learn these — Station 2's 'who knows the real proverb?'
        requires models to have seen proverbs at all.
    probe:
      into: exhibit_examples
      may_enter_training: false
      purpose: >-
        Held-out; NEVER appears in training or the tokenizer corpus. This is the
        set Station 2 tests against.
    assignment_granularity: by_collection    # never split a single proverb's variants across sets
  file:
    path: "ml/data/eval/proverbs.jsonl"      # git-ignored; rebuilt by corpus/proverbs_fetch.py
    probe_path: "ml/data/eval/proverbs_probe.jsonl"
    source_url: "https://www.creolepro.com/blog/haitian-creole-proverbs-cultural-wisdom"
    status: present
    count: 50
    teachable: 35
    probe: 15
    split_seed: 20260720
    note: >-
      50 CreolePro proverbs. Deterministic split (seed 20260720): the 15 with the
      smallest seeded hash are the held-out probe set (written to `probe_path`,
      never ingested); the other 35 are teachable and enter `train`. Re-running
      the fetch + pipeline reproduces the exact split.

# ---------------------------------------------------------------------------
# Per-source split assignment for what is actually built in corpus v0.
# ---------------------------------------------------------------------------
assignment:
  madlad_400_ht_clean: train
  ht_wikipedia: train                 # bot-stubs flagged (wiki_bot_stub), not moved out of train
  owned_proverbs:
    teachable: train                  # pending the proverbs file
    probe: exhibit_examples
  flores_plus:
    dev: model_selection_dev
    devtest: final_devtest
  # Quarantined sources get no split — they never enter any artifact.
  mit_haiti_creoleval: null
  creolepro_dictionary: null

# ---------------------------------------------------------------------------
# Standing eval slices — Phase 1 Workstream E (docs/phase-1.md E2).
# ---------------------------------------------------------------------------
# Two held-out quality axes carved from corpus v0.1 and NEVER trained on. Like
# `tokenizer_eval`, membership is materialized as doc_id manifests and excluded
# by CONSUMERS (training data-prep skips these ids) rather than removed from the
# corpus shard — the v0.1 shard stays the full de-junked corpus. Built by
# corpus/evalslices.py from the 200 human-verified audit labels (tier A, gold)
# plus a conservative, documented heuristic expansion (tier B). Registered here
# so every model (fleet, d12, Model B later) is measured on the SAME slices.
eval_slices:
  built_from: "corpus v0.1 (data/clean/corpus_v0_1-full.jsonl)"
  builder: "corpus/evalslices.py"
  seed: 20260721
  may_enter_training: false        # forever — these are standing quality axes
  carved_by: consumption_doc_id    # excluded at train time, not removed from shard
  manifests:                       # git-ignored (contain source text)
    authored_eval: "ml/data/eval/authored_eval.jsonl"
    translation_shaped_eval: "ml/data/eval/translation_shaped_eval.jsonl"
  slices:
    authored_eval:
      purpose: >-
        Native-voice Kreyòl BPB axis (the quality target). Higher-priority signal
        than raw perplexity because it is the voice we want the model to acquire.
      tier_a_verified: >-
        Audit docs the human concurred are language=ht, quality=ok,
        translation_shaped=natural (audit_model_summary.md §Human verification).
      tier_b_heuristic: >-
        Non-bot-stub Wikipedia (wiki_bot_stub=false) — authored encyclopedic
        Kreyòl — seeded-sampled, capped at 300, disjoint from the audit set.
    translation_shaped_eval:
      purpose: >-
        Machine/translationese Kreyòl BPB axis — the contrast slice. A model whose
        authored_eval BPB improves faster than its translation_shaped_eval BPB is
        acquiring native voice, not just web-Kreyòl (Station 5 nutrition label).
      tier_a_verified: >-
        Audit docs the human concurred are translation_shaped=translated (all crawl).
      tier_b_heuristic: >-
        Crawl docs carrying a residual MT/CMS fingerprint too weak to be dropped as
        junk (>=1 HTML entity, or exactly one XNUMX placeholder) — seeded-sampled,
        capped at 300, disjoint from the audit set.
  note: >-
    Disjoint by construction: audit natural vs translated labels are mutually
    exclusive; tier-B authored is Wikipedia-only and tier-B translationese is
    crawl-only. Some members may also fall in the tokenizer_eval holdout — that is
    harmless (both are excluded from training). Probe proverbs are absent from the
    corpus entirely, so they cannot enter either slice.

# ---------------------------------------------------------------------------
# Standing eval slices — Phase 1 Workstream J (corpus v0.2). The frozen v0.1
# slices above are UNTOUCHED; these are NEW held-out axes added alongside them.
# Same discipline: materialized as doc_id / item manifests (git-ignored, contain
# source text) and excluded by consumers at train time, never trained on, forever.
# ---------------------------------------------------------------------------
eval_slices_v0_2:
  builder: "corpus/build_v0_2.py (VOA temporal split) + corpus/family.py (probe pools)"
  may_enter_training: false          # forever
  carved_by: consumption_doc_id
  slices:
    authored_eval_v2:
      purpose: >-
        A REAL authored-journalism BPB/fertility axis — the first authored-Kreyòl
        eval set of meaningful size. Simultaneously closes the standing
        fertility-report translated-vs-authored TODO (FLORES's Haitian side is
        itself translated; there was no authored set large enough to compare).
      source: voa_nouvel
      rule: >-
        A held-out TEMPORAL slice of VOA — all PD-clean articles whose
        datePublished year is 2026 — carved out BEFORE training and never in the
        train split. Temporal (not random) so it cannot leak near-duplicates of
        trained articles, and so it measures generalization to unseen dates.
      manifest: "ml/data/eval/authored_eval_v2.jsonl"    # git-ignored
      may_enter_training: false
    terminology_probes:
      purpose: >-
        Held-out terminology probe pools from the eval-allocated glossaries — a
        legal / education / clinical terminology axis for exhibit + eval. EVAL-ONLY
        by rights (state / courtesy sources, not cleared for training).
      pools:
        legal_nj_court: {source: nj_court_glossary, manifest: "ml/data/eval/probe_nj_court_terms.jsonl"}
        education_ma_iep: {source: ma_dese_iep, manifest: "ml/data/eval/probe_ma_iep_terms.jsonl"}
        clinical_bmc: {source: bmc_clinical_glossary, manifest: "ml/data/eval/probe_bmc_clinical_terms.jsonl", tag: nonstandard_orthography}
      may_enter_training: false
  note: >-
    authored_eval_v2 members are removed from the trainable VOA set by doc_id
    before the corpus v0.2 shard's train partition is written, so a 2026 article
    is either eval or (if excluded) nowhere in train — never both. Probe proverbs
    remain absent from the corpus entirely and from every slice.

# Per-source split assignment for the Workstream J sources (extends `assignment`).
assignment_v0_2:
  voa_nouvel: train                  # except 2026 articles -> authored_eval_v2
  fineweb2_hat: train
  us_federal_pdfs: train
  cfpb_glossary_family: train
  bib_la_1985: train                 # religious register cap <=2% enforced at build
  konstitisyon_1987: train
  bloom_lm_hat: train                # BY/BY-SA keepers only; pending HF gate
  storybooks_haiti: train
  # eval-only / quarantined J3 sources get no train split:
  nj_court_glossary: exhibit_examples
  ma_dese_iep: exhibit_examples
  bmc_clinical_glossary: exhibit_examples
  family_file_7167: null             # pending producer identification
  freeman_medical_dictionary: null   # quarantined
